<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Registration / Service Requesst Form</title>
</head>
<body>

  <h1>Company Registration / Service Request Form</h1>

  <form action="#" method="post">

    <fieldset>
      <legend>Company Information</legend>

      <label for="companyName">Company Name:</label><br>
      <input type="text" id="companyName" name="companyName" required><br><br>

      <label for="regNumber">Registration Number:</label><br>
      <input type="text" id="regNumber" name="regNumber" required><br><br>

      <label for="website">Compaany Website:</label><br>
      <input type="url" id="website" name="website" placeholder="https://example.com"><br><br>

      <label for="founded">Date Founded:</label><br>
      <input type="date" id="founded" name="founded" required><br>
    </fieldset>

    <br>

    <fieldset>
      <legend>Contact Person</legend>

      <label for="fullName">Full Name:</label><br>
      <input type="text" id="fullName" name="fullName" required><br><br>

      <label for="email">Email Address:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="phone">Phone Number:</label><br>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0712345678" required><br>
    </fieldset>

    <br>

    <fieldset>
      <legend>Service Request</legend>

      <label for="serviceType">Type of Service Needed:</label><br>
      <select id="serviceType" name="serviceType" required>
        <option value="">-- Select a service --</option>
        <option value="consulting">Consulting</option>
        <option value="web-dev">Web Development</option>
        <option value="design">Design</option>
        <option value="support">Technical Support</option>
      </select><br><br>

      <label for="startDate">Preferred Start Date:</label><br>
      <input type="date" id="startDate" name="startDate" required><br><br>

      <label for="details">Additional Details:</label><br>
      <textarea id="details" name="details" rows="4" cols="40"></textarea><br>
    </fieldset>

    <br>

    <input type="submit" value="Submit Request">

  </form>

</body>
        </html>
