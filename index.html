<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Registration / Service Request Form</title>
</head>
<body>

  <h1>Company Registration / Service Request Form</h1>

  <form method="post" action="#">

    <fieldset>
      <legend>1. Personal Information</legend>

      <label for="fullName">Full Name:</label><br>
      <input type="text" id="fullName" name="fullName" minlength="3" maxlength="50" required><br><br>

      <label for="email">Email Address:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="phone">Phone Number:</label><br>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0712345678" required>
    </fieldset>

    <br>

    <fieldset>
      <legend>2. Company Information</legend>

      <label for="companyName">Company Name:</label><br>
      <input type="text" id="companyName" name="companyName" minlength="2" maxlength="60" required><br><br>

      <label for="companyWebsite">Company Website:</label><br>
      <input type="url" id="companyWebsite" name="companyWebsite" placeholder="https://example.com"><br><br>

      <label for="companySize">Company Size:</label><br>
      <select id="companySize" name="companySize" required>
        <option value="">-- Select company size --</option>
        <option value="1-10">1-10 employees</option>
        <option value="11-50">11-50 employees</option>
        <option value="51-200">51-200 employees</option>
        <option value="201+">201+ employees</option>
      </select><br><br>

      <label for="industry">Industry:</label><br>
      <input type="text" id="industry" name="industry" required>
    </fieldset>

    <br>

    <fieldset>
      <legend>3. Service Request</legend>

      <p>Service Type:</p>
      <input type="radio" id="serviceConsulting" name="serviceType" value="consulting" required>
      <label for="serviceConsulting">Consulting</label><br>

      <input type="radio" id="serviceWebDev" name="serviceType" value="webdev">
      <label for="serviceWebDev">Web Development</label><br>

      <input type="radio" id="serviceDesign" name="serviceType" value="design">
      <label for="serviceDesign">Design</label><br>

      <input type="radio" id="serviceSupport" name="serviceType" value="support">
      <label for="serviceSupport">Technical Support</label><br><br>

      <p>Preferred Contact Method:</p>
      <input type="checkbox" id="contactEmail" name="contactMethod" value="email">
      <label for="contactEmail">Email</label><br>

      <input type="checkbox" id="contactPhone" name="contactMethod" value="phone">
      <label for="contactPhone">Phone</label><br>

      <input type="checkbox" id="contactSMS" name="contactMethod" value="sms">
      <label for="contactSMS">SMS</label><br><br>

      <label for="appointmentDate">Appointment Date:</label><br>
      <input type="date" id="appointmentDate" name="appointmentDate" min="2026-07-01" max="2026-12-31" required><br><br>

      <label for="appointmentTime">Appointment Time:</label><br>
      <input type="time" id="appointmentTime" name="appointmentTime" required><br><br>

      <label for="budgetRange">Budget Range:</label><br>
      <select id="budgetRange" name="budgetRange" required>
        <option value="">-- Select budget range --</option>
        <option value="under-50k">Under KES 50,000</option>
        <option value="50k-200k">KES 50,000 - 200,000</option>
        <option value="200k-500k">KES 200,000 - 500,000</option>
        <option value="500k+">KES 500,000+</option>
      </select>
    </fieldset>

    <br>

    <fieldset>
      <legend>4. Message and Agreement</legend>

      <label for="additionalInfo">Additional Information:</label><br>
      <textarea id="additionalInfo" name="additionalInfo" rows="5" cols="40" maxlength="500"></textarea><br><br>

      <input type="checkbox" id="terms" name="terms" required>
      <label for="terms">I agree to the Terms and Conditions</label>
    </fieldset>

    <br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

  </form>

</body>
</html>
